server.port=${PORT:8080}
spring.application.name=opensoundtouch-backend

# Radio-Browser API (community-driven internet radio catalog)
radiobrowser.base-url=${RADIOBROWSER_BASE_URL:https://all.api.radio-browser.info}
radiobrowser.user-agent=${RADIOBROWSER_USER_AGENT:OpenSoundTouch/0.1}

# Logging
logging.level.com.opensoundtouch=INFO
